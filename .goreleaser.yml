version: 2

project_name: gobce

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: gobce
    main: ./cmd/gobce
    binary: gobce
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: archives
    builds:
      - gobce
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  use: git
